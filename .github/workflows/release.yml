name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: src/Spelllang/Spelllang.csproj
  REPO: technicallyRats/spelllang

jobs:
  verify:
    name: Verify tag matches csproj version
    runs-on: ubuntu-latest
    outputs:
      tag-version: ${{ steps.versions.outputs.tag-version }}
      csproj-version: ${{ steps.versions.outputs.csproj-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compare tag and csproj versions
        id: versions
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CSPROJ_VERSION=$(grep -oP '<Version>\K[^<]+' "$PROJECT_PATH")

          echo "Tag version:     $TAG_VERSION"
          echo "Csproj version:  $CSPROJ_VERSION"

          echo "tag-version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "csproj-version=$CSPROJ_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$TAG_VERSION" != "$CSPROJ_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match csproj Version $CSPROJ_VERSION"
            exit 1
          fi

          echo "Versions match."

  build:
    name: Build Spelllang DLL
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build (Release)
        run: dotnet build "$PROJECT_PATH" -c Release

      - name: Stage artifacts
        run: |
          mkdir -p artifacts
          cp src/Spelllang/bin/Release/netstandard2.1/Spelllang.dll artifacts/
          cp src/Spelllang/bin/Release/netstandard2.1/Spelllang.xml artifacts/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spelllang-dll
          path: artifacts/*
          if-no-files-found: error
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: spelllang-dll
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            artifacts/Spelllang.dll \
            artifacts/Spelllang.xml \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --repo "$REPO"